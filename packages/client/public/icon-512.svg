<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5c2e"/>
      <stop offset="100%" style="stop-color:#0f3d1e"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="102" fill="url(#bg)"/>
  <!-- Card shape -->
  <rect x="138" y="85" width="236" height="342" rx="24" fill="url(#card)" opacity="0.95"/>
  <!-- S letter -->
  <text x="256" y="305" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="192" fill="#1a5c2e">S</text>
  <!-- Gold accent line -->
  <rect x="165" y="375" width="182" height="8" rx="4" fill="#ffd700"/>
</svg>
